<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codyssey - AI/SW 개발 워크스테이션</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;

            color: #e0e0e0;
        }
        h1 { color: #00d4ff; text-align: center; }
        .info {
            background: #16213e;

            border-radius: 4px;
        }
        .status { color: #00ff88; font-weight: bold; }

<body>
    <h1>Codyssey Dev Workstation</h1>
    <div class="info">
        <p class="status">Container Status: Running</p>
        <p>Base Image: nginx:alpine</p>
        <p>Custom Build: my-web:1.0</p>
    </div>
    <div class="info">
        <h3>Mission</h3>
        <p>AI/SW 개발 워크스테이션 구축 - 터미널, Docker, Git 환경 세팅</p>
    </div>

</html>
